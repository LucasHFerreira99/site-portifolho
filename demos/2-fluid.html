<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — Fluid Ink Blobs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; overflow: hidden; }
  canvas { display: block; }
  .label {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.25); font-size: .75rem; letter-spacing: .1em;
    text-transform: uppercase; pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<p class="label">Clique para criar manchas</p>
<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Paleta
  const COLORS = [
    [99, 102, 241],   // indigo
    [14, 165, 233],   // sky
    [168, 85, 247],   // violet
    [34, 211, 238],   // cyan
    [236, 72, 153],   // pink
  ];

  function randomColor() {
    return COLORS[Math.floor(Math.random() * COLORS.length)];
  }

  const blobs = [];

  function spawnBlob(x, y) {
    const color = randomColor();
    blobs.push({
      x, y,
      tx: x + (Math.random() - .5) * 200,
      ty: y + (Math.random() - .5) * 200,
      radius: 60 + Math.random() * 80,
      phase: Math.random() * Math.PI * 2,
      speed: 0.003 + Math.random() * 0.004,
      drift: 0.004 + Math.random() * 0.003,
      r: color[0], g: color[1], b: color[2],
      alpha: 0,
      life: 0,
      maxLife: 300 + Math.random() * 200,
    });
  }

  // Spawn inicial
  for (let i = 0; i < 6; i++) {
    spawnBlob(Math.random() * innerWidth, Math.random() * innerHeight);
    blobs[blobs.length - 1].alpha = 0.08 + Math.random() * 0.07;
    blobs[blobs.length - 1].life  = Math.random() * 150;
  }

  canvas.addEventListener('click', e => spawnBlob(e.clientX, e.clientY));

  function draw() {
    ctx.clearRect(0, 0, W, H);

    for (let i = blobs.length - 1; i >= 0; i--) {
      const b = blobs[i];
      b.life++;
      b.phase += b.speed;

      // Float toward target
      b.x += (b.tx - b.x) * b.drift;
      b.y += (b.ty - b.y) * b.drift;

      // Breathe radius
      const r = b.radius * (1 + 0.18 * Math.sin(b.phase));
      const ry = r * (0.75 + 0.15 * Math.cos(b.phase * 1.3));

      // Fade in / out
      const half = b.maxLife / 2;
      if (b.life < 60) b.alpha = Math.min((b.life / 60) * 0.12, 0.12);
      else if (b.life > b.maxLife - 80) b.alpha = Math.max(0, b.alpha - 0.0014);

      ctx.save();
      ctx.filter = `blur(${Math.round(r * 0.5)}px)`;
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, r, ry, b.phase * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${b.r},${b.g},${b.b},${b.alpha})`;
      ctx.fill();
      ctx.restore();

      if (b.life >= b.maxLife) {
        blobs.splice(i, 1);
        // Auto-respawn a new one
        spawnBlob(Math.random() * W, Math.random() * H);
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
